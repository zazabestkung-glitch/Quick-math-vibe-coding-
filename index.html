<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Game Pro</title>
    <style>
        body { display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; font-family: 'Segoe UI', sans-serif; background: #e9ecef; }
        #game-container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 450px; }
        input, button { display: block; width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; cursor: pointer; border: none; font-weight: bold; }
        button:hover { background: #0056b3; }
        .hidden { display: none !important; }
        h3 { color: #333; margin-top: 20px; border-bottom: 2px solid #007bff; padding-bottom: 5px; }
        .checkbox-group { display: flex; justify-content: space-around; margin: 15px 0; }
        #modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 20px; border-radius: 8px; width: 80%; max-width: 300px; max-height: 80vh; overflow-y: auto; }
    </style>
</head>
<body>

<div id="game-container">
    <select id="lang-select" onchange="changeLanguage()" style="width: auto; margin-bottom: 20px;">
        <option value="en">English</option>
        <option value="th">ภาษาไทย</option>
    </select>

    <div id="menu">
        <h1 id="t-title">Math Game Pro</h1>
        <button onclick="setup('Time Attack')" id="t-time-attack">Time Attack</button>
        <button onclick="setup('Endless')" id="t-endless">Endless</button>
    </div>

    <div id="setup" class="hidden">
        <h2 id="t-setup">Setup</h2>
        <label id="t-range">Max Number Range:</label>
        <input type="number" id="max-digit" value="10">
        <div id="time-group">
            <label id="t-limit">Time Limit (s):</label>
            <input type="number" id="time-limit" value="30">
        </div>
        <p id="t-ops">Operations:</p>
        <div class="checkbox-group">
            <label><input type="checkbox" id="op-add" checked> +</label>
            <label><input type="checkbox" id="op-sub" checked> -</label>
            <label><input type="checkbox" id="op-mul" checked> *</label>
            <label><input type="checkbox" id="op-div" checked> /</label>
        </div>
        <button onclick="startGame()" id="t-start">Start Game</button>
        <button onclick="showMenu()" style="background:#6c757d;" id="t-back">Back</button>
    </div>

    <div id="game" class="hidden">
        <div id="score">Score: 0</div>
        <div id="timer" style="color: red; font-weight: bold;"></div>
        <h2 id="question">?</h2>
        <input type="number" id="answer" placeholder="Answer" onkeydown="handleEnter(event)">
        <button onclick="checkAnswer()" id="t-submit">Submit</button>
        <button id="btn-skip" onclick="nextQuestion()" style="background:#ffc107; color:black;" id="t-skip">Skip</button>
        <button id="btn-history" class="hidden" onclick="showHistory()" style="background:#17a2b8;" id="t-history">View History</button>
        <button onclick="showMenu()" style="background:#dc3545;" id="t-menu">Back to Menu</button>
    </div>
</div>

<div id="modal" class="hidden">
    <div class="modal-content">
        <h3 id="t-hist-title">Question History</h3>
        <ul id="history-list"></ul>
        <button onclick="closeModal()" id="t-close">Close</button>
    </div>
</div>

<script>
    const dict = {
        en: { title: "Math Game Pro", ta: "Time Attack", end: "Endless", setup: "Setup", range: "Max Number Range:", limit: "Time Limit (s):", ops: "Operations:", start: "Start Game", back: "Back", submit: "Submit", skip: "Skip", history: "View History", menu: "Back to Menu", histTitle: "Question History", close: "Close", score: "Score: ", time: "Time: ", over: "Game Over!", opsAlert: "Select an operation!", noHist: "No history yet!" },
        th: { title: "เกมคณิตศาสตร์", ta: "โหมดจำกัดเวลา", end: "โหมดไม่จำกัด", setup: "ตั้งค่า", range: "ตัวเลขสูงสุด:", limit: "จำกัดเวลา (วินาที):", ops: "การดำเนินการ:", start: "เริ่มเกม", back: "ย้อนกลับ", submit: "ส่งคำตอบ", skip: "ข้าม", history: "ดูประวัติ", menu: "กลับสู่เมนูหลัก", histTitle: "ประวัติคำถาม", close: "ปิด", score: "คะแนน: ", time: "เวลา: ", over: "จบเกม!", opsAlert: "โปรดเลือกการดำเนินการอย่างน้อยหนึ่งรายการ!", noHist: "ยังไม่มีประวัติ!" }
    };

    let mode, score, ans, timer, timeLimit, questionHistory = [], lang = 'en';

    function changeLanguage() {
        lang = document.getElementById('lang-select').value;
        document.getElementById('t-title').innerText = dict[lang].title;
        document.getElementById('t-time-attack').innerText = dict[lang].ta;
        document.getElementById('t-endless').innerText = dict[lang].end;
        document.getElementById('t-setup').innerText = dict[lang].setup;
        document.getElementById('t-range').innerText = dict[lang].range;
        document.getElementById('t-limit').innerText = dict[lang].limit;
        document.getElementById('t-ops').innerText = dict[lang].ops;
        document.getElementById('t-start').innerText = dict[lang].start;
        document.getElementById('t-back').innerText = dict[lang].back;
        document.getElementById('t-submit').innerText = dict[lang].submit;
        document.getElementById('btn-skip').innerText = dict[lang].skip;
        document.getElementById('btn-history').innerText = dict[lang].history;
        document.getElementById('t-menu').innerText = dict[lang].menu;
        document.getElementById('t-hist-title').innerText = dict[lang].histTitle;
        document.getElementById('t-close').innerText = dict[lang].close;
    }

    function toggle(showIds, hideIds) {
        showIds.forEach(id => document.getElementById(id).classList.remove('hidden'));
        hideIds.forEach(id => document.getElementById(id).classList.add('hidden'));
    }

    function handleEnter(event) { if (event.key === 'Enter') checkAnswer(); }
    function showMenu() { clearInterval(timer); toggle(['menu'], ['setup', 'game', 'modal']); document.getElementById('btn-history').classList.add('hidden'); }
    function setup(m) { mode = m; document.getElementById('time-group').style.display = (m === 'Time Attack') ? 'block' : 'none'; toggle(['setup'], ['menu', 'game']); }

    function startGame() {
        score = 0; questionHistory = [];
        document.getElementById('score').innerText = dict[lang].score + "0";
        toggle(['game'], ['menu', 'setup']);
        const skipBtn = document.getElementById('btn-skip'), historyBtn = document.getElementById('btn-history');
        if (mode === 'Time Attack') {
            skipBtn.classList.add('hidden'); historyBtn.classList.add('hidden');
            timeLimit = parseInt(document.getElementById('time-limit').value);
            timer = setInterval(() => {
                timeLimit--;
                document.getElementById('timer').innerText = dict[lang].time + timeLimit;
                if (timeLimit <= 0) { clearInterval(timer); alert(dict[lang].over); showMenu(); }
            }, 1000);
        } else { skipBtn.classList.remove('hidden'); historyBtn.classList.remove('hidden'); document.getElementById('timer').innerText = ""; }
        nextQuestion();
    }

    function nextQuestion() {
        const ops = ['+', '-', '*', '/'].filter(o => document.getElementById('op-' + (o==='+'?'add':o==='-'?'sub':o==='*'?'mul':'div')).checked);
        if (ops.length === 0) return alert(dict[lang].opsAlert);
        const op = ops[Math.floor(Math.random() * ops.length)];
        const limit = parseInt(document.getElementById('max-digit').value) || 10;
        let n1 = Math.floor(Math.random() * limit) + 1, n2 = Math.floor(Math.random() * limit) + 1;
        if (op === '/') { n1 = n1 * n2; ans = n1 / n2; }
        else if (op === '+') ans = n1 + n2;
        else if (op === '-') { if (n1 < n2) [n1, n2] = [n2, n1]; ans = n1 - n2; }
        else ans = n1 * n2;
        document.getElementById('question').innerText = `${n1} ${op} ${n2}`;
        document.getElementById('answer').value = '';
        document.getElementById('answer').focus();
    }

    function checkAnswer() {
        const userVal = parseInt(document.getElementById('answer').value);
        if (!isNaN(userVal) && userVal === ans) {
            questionHistory.push({ q: document.getElementById('question').innerText, a: ans });
            score++;
            document.getElementById('score').innerText = dict[lang].score + score;
            nextQuestion();
        }
    }

    function showHistory() {
        const list = document.getElementById('history-list');
        list.innerHTML = questionHistory.length ? questionHistory.map((h, i) => `<li>#${i+1}: ${h.q} = ${h.a}</li>`).join('') : dict[lang].noHist;
        document.getElementById('modal').classList.remove('hidden');
    }

    function closeModal() { document.getElementById('modal').classList.add('hidden'); }
</script>
</body>
</html>
